name: Release APK

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        id: changelog
        run: |
          chmod +x scripts/extract-changelog.sh
          CHANGELOG_BODY=$(scripts/extract-changelog.sh "${{ steps.version.outputs.version }}")
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── Signing (optional) ──────────────────────────────────────────────────
      - name: Decode keystore (if secrets are set)
        if: >
          env.KEYSTORE_BASE64 != '' &&
          env.KEYSTORE_PASSWORD != '' &&
          env.KEY_ALIAS != '' &&
          env.KEY_PASSWORD != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/release.keystore
          echo "KEYSTORE_FILE=${{ github.workspace }}/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> $GITHUB_ENV
          echo "KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon -PappVersionName=${{ steps.version.outputs.version }}

      - name: Prepare Release APK name
        run: |
          mkdir -p output/
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk output/ollee-glycemia-${{ steps.version.outputs.version }}-release.apk
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk output/ollee-glycemia-${{ steps.version.outputs.version }}-release.apk
          fi

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollee-glycemia-${{ steps.version.outputs.version }}-release.apk
          path: output/ollee-glycemia-${{ steps.version.outputs.version }}-release.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.body }}

          generate_release_notes: true
          files: output/ollee-glycemia-${{ steps.version.outputs.version }}-release.apk

      # ── Cleanup ──────────────────────────────────────────────────────────────
      - name: Remove keystore file
        if: always()
        run: rm -f ${{ github.workspace }}/release.keystore
