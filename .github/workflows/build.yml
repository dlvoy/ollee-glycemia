name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get Short SHA
        id: git_sha
        run: echo "sha=$(git rev-parse --short=6 HEAD)" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Prepare Debug APK name
        run: |
          mkdir -p output/
          cp app/build/outputs/apk/debug/app-debug.apk output/ollee-glycemia-${{ steps.git_sha.outputs.sha }}-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ollee-glycemia-${{ steps.git_sha.outputs.sha }}-debug.apk
          path: output/ollee-glycemia-${{ steps.git_sha.outputs.sha }}-debug.apk
          retention-days: 14
